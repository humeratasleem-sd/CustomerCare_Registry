services:
  - type: web
    name: customer-care-registry
    env: node
    plan: free
    healthCheckPath: /api/health
    buildCommand: npm install --prefix server && npm install --prefix client && npm run build --prefix client
    startCommand: npm start --prefix server
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGODB_URI
        fromDatabase:
          name: customer-care-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRE
        value: 7d
      - key: CLIENT_URL
        value: https://customer-care-registry-silk.vercel.app
      - key: VITE_API_URL
        value: https://customer-care-registry.onrender.com/api
      - key: VITE_SOCKET_URL
        value: https://customer-care-registry.onrender.com
      - key: DEFAULT_ADMIN_EMAIL
        value: admin@customercare.com
      - key: DEFAULT_ADMIN_PASSWORD
        value: Admin@123

databases:
  - name: customer-care-db
    databaseName: customercare
    user: admin
    plan: free
